<!doctype html><html><head><meta charset="utf-8"><title>service-desk-chat</title><style>body{margin:0;font-family:Inter,Arial,sans-serif;background:#0b1220;color:#fff}.shell{display:grid;grid-template-columns:280px 1fr 320px;min-height:100vh}.pane{padding:20px;border-right:1px solid rgba(255,255,255,.08)}.center{padding:24px}.bubble{background:rgba(255,255,255,.08);border-radius:18px;padding:14px 16px;margin-bottom:12px}.input{margin-top:18px;border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:14px}</style></head><body><div class="shell"><aside class="pane"><h3>会话历史</h3><div class="bubble">退款进度查询</div><div class="bubble">发票开具说明</div></aside><main class="center"><h2>服务台问答</h2><div class="bubble">用户：订单为什么还没发货？</div><div class="bubble">系统：已为你匹配订单状态与 FAQ 建议。</div><div class="input">请输入问题…</div></main><aside class="pane"><h3>工单上下文</h3><div class="bubble">客户等级 / 最近工单 / 推荐问题</div></aside></div></body></html>
