<!doctype html><html><head><meta charset="utf-8"><title>ops-center</title><style>body{margin:0;font-family:Inter,Arial,sans-serif;background:#f3f7fb;color:#10233f}.shell{display:grid;grid-template-columns:260px 1fr;min-height:100vh}.side{background:#0f172a;color:#fff;padding:24px}.main{padding:28px}.hero{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}.card{background:#fff;border:1px solid #dbe5f0;border-radius:18px;padding:18px;box-shadow:0 10px 30px rgba(15,35,63,.06)}.panel{margin-top:20px;background:#fff;border:1px solid #dbe5f0;border-radius:20px;padding:20px}</style></head><body><div class="shell"><aside class="side"><h2>运营管理中心</h2><p>任务、项目、工单、风险统一协作。</p></aside><main class="main"><section class="hero"><div class="card">待办任务</div><div class="card">处理时效</div><div class="card">风险项目</div><div class="card">本周进度</div></section><section class="panel">列表 / 详情 / 表单联动工作区</section></main></div></body></html>
